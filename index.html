<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --bg: #FDF6EE;
    --surface: #FFFCF8;
    --surface2: #F2E8DA;
    --border: #E0D0BC;
    --text: #2A1F14;
    --text-muted: #7A6555;
    --accent: #9B3A1A;
    --accent-light: #F5E6DF;
    --accent2: #3A6B3A;
    --accent2-light: #DFF0DF;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  header { background: var(--text); color: var(--bg); padding: 0 24px; display: flex; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; gap: 10px; }
  .logo { font-family: var(--serif); font-size: 1.25rem; letter-spacing: 0.02em; color: var(--bg); }
  .logo span { color: #D4845A; }
  .logo-sub { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #A08878; margin-top: 2px; }

  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; scrollbar-width: none; position: sticky; top: 60px; z-index: 99; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn { flex-shrink: 0; padding: 14px 20px; font-family: var(--sans); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { flex: 1; padding: 24px 16px; max-width: 900px; margin: 0 auto; width: 100%; }
  .view { display: none; }
  .view.active { display: block; }

  .view-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
  .view-title { font-family: var(--serif); font-size: 1.8rem; color: var(--text); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 6px; font-family: var(--sans); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7A2D14; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-ghost { background: none; color: var(--text-muted); padding: 6px 10px; border: none; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-family: var(--sans); font-weight: 500; }
  .btn-ghost:hover { color: var(--accent); background: var(--accent-light); }
  .btn-danger { background: none; color: #B03030; padding: 6px 10px; border: none; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-family: var(--sans); }
  .btn-danger:hover { background: #FDE8E8; }
  .btn-sm { padding: 6px 12px; font-size: 0.78rem; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-top { display: flex; align-items: center; padding: 14px 16px; gap: 10px; }
  .card-info { flex: 1; min-width: 0; cursor: pointer; }
  .card-title { font-weight: 600; font-size: 0.95rem; }
  .card-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; font-family: var(--mono); }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  .card-body { display: none; padding: 12px 16px 14px; border-top: 1px solid var(--surface2); }
  .card-body.open { display: block; }
  .caret { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; display: inline-block; cursor: pointer; padding: 6px; }
  .caret.open { transform: rotate(90deg); }

  .menu-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 640px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
  .menu-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
  .menu-tile:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #C8A898; }
  .menu-tile-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .menu-tile-name { font-family: var(--serif); font-size: 1.15rem; color: var(--text); line-height: 1.2; }
  .menu-tile-arrow { color: var(--text-muted); font-size: 1rem; margin-top: 2px; }
  .menu-tile-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .menu-stat { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .menu-stat-val { font-family: var(--serif); font-size: 1.15rem; color: var(--accent); }
  .menu-stat-lbl { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
  .menu-tile-recipes { font-size: 0.75rem; color: var(--text-muted); margin-top: 10px; }

  .detail-back { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .detail-title { font-family: var(--serif); font-size: 1.8rem; color: var(--text); }
  .detail-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .detail-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .detail-stat-val { font-family: var(--serif); font-size: 1.5rem; color: var(--accent); }
  .detail-stat-lbl { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
  .detail-actions { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .detail-edit-panel { background: var(--accent-light); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; display: none; }
  .detail-edit-panel.open { display: block; }
  .detail-edit-panel h3 { font-family: var(--serif); font-size: 1.1rem; color: var(--accent); margin-bottom: 14px; }

  .estimator-back { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .estimator-menu-name { font-family: var(--serif); font-size: 1.6rem; color: var(--text); }

  .form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .form-panel h3 { font-family: var(--serif); font-size: 1.1rem; margin-bottom: 16px; color: var(--text); }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .form-group label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
  input, select, textarea { font-family: var(--sans); font-size: 0.88rem; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: white; }
  textarea { resize: vertical; min-height: 70px; }

  .ing-row { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--surface2); }
  .ing-row:last-child { border-bottom: none; }
  .section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }

  .est-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .est-table th { text-align: left; padding: 8px 10px; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
  .est-table td { padding: 10px 10px; border-bottom: 1px solid var(--surface2); vertical-align: middle; }
  .est-table tr:last-child td { border-bottom: none; }
  .est-table .num { font-family: var(--mono); text-align: right; font-size: 0.83rem; }
  .est-table tfoot td { font-weight: 600; background: var(--surface2); border-top: 2px solid var(--border); }
  .qty-input { width: 65px; text-align: center; font-family: var(--mono); font-size: 0.88rem; padding: 5px 6px; }
  .cost-better { color: var(--accent2); font-weight: 600; }
  .sweet-spot { font-size: 0.75rem; margin-top: 4px; padding: 3px 8px; border-radius: 4px; display: inline-block; }
  .sweet-spot.hint { background: #FFF4E0; color: #8B5C00; border: 1px solid #F0D080; }
  .sweet-spot.optimal { background: var(--accent2-light); color: var(--accent2); border: 1px solid #A8D8A8; }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .summary-box .val { font-family: var(--serif); font-size: 1.5rem; color: var(--accent); }
  .summary-box .lbl { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

  .menu-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .menu-selector label { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
  .menu-selector select { max-width: 260px; flex: 1; }
  .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--surface2); font-size: 0.88rem; }
  .shop-item:last-child { border-bottom: none; }
  .shop-qty { font-family: var(--mono); font-size: 0.82rem; color: var(--accent); font-weight: 500; white-space: nowrap; margin-left: 12px; }

  .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 0.88rem; margin-top: 6px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .storage-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .storage-bar strong { color: var(--accent2); }

  @media (max-width: 500px) {
    .view-title, .detail-title { font-size: 1.4rem; }
    .summary-box .val { font-size: 1.2rem; }
    .est-table th, .est-table td { padding: 7px 5px; font-size: 0.75rem; }
    .qty-input { width: 52px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo" id="header-logo"></div>
    <div class="logo-sub" id="header-tagline"></div>
  </div>
</header>

<div class="storage-bar">
  <span>💾 <strong>Auto-saving</strong> to this browser</span>
  <button class="btn-ghost btn-sm" onclick="clearAllData()" style="font-size:0.72rem;padding:3px 8px;">Reset to defaults</button>
</div>

<nav>
  <button class="nav-btn active" onclick="showView('ingredients', this)">Ingredients</button>
  <button class="nav-btn" onclick="showView('recipes', this)">Recipes</button>
  <button class="nav-btn" onclick="showView('menus', this)">Menus</button>
  <button class="nav-btn" onclick="showView('shopping', this)">Shopping List</button>
</nav>

<main>

<!-- INGREDIENTS -->
<div id="view-ingredients" class="view active">
  <div class="view-header">
    <div class="view-title">Ingredients</div>
    <button class="btn btn-primary" onclick="openIngForm()">+ Add Ingredient</button>
  </div>
  <div class="form-panel" id="ingForm" style="display:none">
    <h3 id="ingFormTitle">New Ingredient</h3>
    <input type="hidden" id="ing-edit-id">
    <div class="form-row">
      <div class="form-group" style="flex:3"><label>Name</label><input id="ing-name" type="text" placeholder="e.g. All-Purpose Flour"></div>
      <div class="form-group" style="flex:2"><label>Unit of Measure</label><input id="ing-uom" type="text" placeholder="e.g. cup, tsp, oz"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Package Size (in UoM)</label><input id="ing-size" type="number" placeholder="e.g. 18.9" min="0" step="any"></div>
      <div class="form-group"><label>Package Price ($)</label><input id="ing-price" type="number" placeholder="e.g. 1.97" min="0" step="0.01"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="saveIngredient()">Save</button>
      <button class="btn btn-secondary" onclick="closeIngForm()">Cancel</button>
    </div>
  </div>
  <div id="ingList"></div>
</div>

<!-- RECIPES -->
<div id="view-recipes" class="view">
  <div class="view-header">
    <div class="view-title">Recipes</div>
    <button class="btn btn-primary" onclick="openRecipeForm()">+ Add Recipe</button>
  </div>
  <div class="form-panel" id="recipeForm" style="display:none">
    <h3 id="recFormTitle">New Recipe</h3>
    <input type="hidden" id="rec-edit-id">
    <div class="form-row">
      <div class="form-group" style="flex:3"><label>Recipe Name</label><input id="rec-name" type="text" placeholder="e.g. Chocolate Chip Cookies"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Description (optional)</label><textarea id="rec-desc" placeholder="Brief description or yield..."></textarea></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-label">Ingredients</div>
      <button class="btn btn-secondary btn-sm" onclick="addIngRow()">+ Add</button>
    </div>
    <div id="recIngRows"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="saveRecipe()">Save Recipe</button>
      <button class="btn btn-secondary" onclick="closeRecipeForm()">Cancel</button>
    </div>
  </div>
  <div id="recipeList"></div>
</div>

<!-- MENUS -->
<div id="view-menus" class="view">
  <div id="screen-grid">
    <div class="view-header">
      <div class="view-title">Menus</div>
      <button class="btn btn-primary" onclick="showNewMenuForm()">+ New Menu</button>
    </div>
    <div class="form-panel" id="newMenuForm" style="display:none">
      <h3>New Menu</h3>
      <div class="form-row">
        <div class="form-group" style="flex:3"><label>Menu Name</label><input id="new-menu-name" type="text" placeholder="e.g. Saturday Farmers Market"></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-label">Recipes</div>
        <button class="btn btn-secondary btn-sm" onclick="addNewMenuRecipeRow()">+ Add Recipe</button>
      </div>
      <div id="newMenuRecipeRows"></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="saveNewMenu()">Save Menu</button>
        <button class="btn btn-secondary" onclick="hideNewMenuForm()">Cancel</button>
      </div>
    </div>
    <div id="menuGrid"></div>
  </div>

  <div id="screen-detail" style="display:none">
    <div class="detail-back">
      <button class="btn btn-secondary btn-sm" onclick="showGrid()">← Menus</button>
      <div class="detail-title" id="detail-title"></div>
    </div>
    <div class="detail-stats" id="detail-stats"></div>
    <div class="detail-actions">
      <button class="btn btn-primary" onclick="openEstimator()">Open Estimator</button>
      <button class="btn btn-secondary" onclick="toggleDetailEdit()">Edit Menu</button>
      <button class="btn-danger" onclick="deleteCurrentMenu()">Delete</button>
    </div>
    <div class="detail-edit-panel" id="detail-edit-panel">
      <h3>Edit Menu</h3>
      <div class="form-row">
        <div class="form-group" style="flex:3"><label>Menu Name</label><input id="detail-menu-name" type="text"></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-label">Recipes</div>
        <button class="btn btn-secondary btn-sm" onclick="addDetailMenuRecipeRow()">+ Add Recipe</button>
      </div>
      <div id="detail-menu-recipe-rows"></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="saveDetailMenuEdit()">Save</button>
        <button class="btn btn-secondary" onclick="toggleDetailEdit()">Cancel</button>
      </div>
    </div>
    <div class="card">
      <div style="padding:4px 0 12px"><span class="section-label">Recipes in this menu</span></div>
      <div id="detail-recipe-list"></div>
    </div>
  </div>

  <div id="screen-estimator" style="display:none">
    <div class="estimator-back">
      <button class="btn btn-secondary btn-sm" onclick="closeEstimator()">← Menu</button>
      <div class="estimator-menu-name" id="estimator-title"></div>
    </div>
    <div id="estimatorContent"></div>
  </div>
</div>

<!-- SHOPPING LIST -->
<div id="view-shopping" class="view">
  <div class="view-header"><div class="view-title">Shopping List</div></div>
  <div class="menu-selector">
    <label>Menu</label>
    <select id="shop-menu-select" onchange="renderShoppingList()">
      <option value="">— Select a menu —</option>
    </select>
  </div>
  <div id="shoppingContent">
    <div class="empty"><div class="empty-icon">🛒</div><strong>Select a menu to generate a shopping list</strong></div>
  </div>
</div>

</main>

<script>
// ── BOOT FROM CONFIG ──────────────────────────────────
const cfg = window.VERTICAL_CONFIG;
if (!cfg) { document.body.innerHTML = '<p style="padding:40px;font-family:sans-serif">Error: config.js not loaded.</p>'; throw new Error('VERTICAL_CONFIG missing'); }

// Apply branding
document.getElementById('page-title').textContent = cfg.appName;
document.getElementById('header-logo').innerHTML = cfg.logoHTML;
document.getElementById('header-tagline').textContent = cfg.tagline;

// Apply color palette
const root = document.documentElement;
Object.entries(cfg.colors).forEach(([k, v]) => root.style.setProperty('--' + k, v));

// ── STATE ─────────────────────────────────────────────
const STORAGE_KEY = cfg.storageKey;

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(cfg.defaultState));
}
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function clearAllData() {
  if (!confirm('Reset everything to defaults? Your custom data will be lost.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(cfg.defaultState));
  saveState(); renderIngredients();
}
let state = loadState();
let currentMenuId = null;

// ── NAV ───────────────────────────────────────────────
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'ingredients') renderIngredients();
  if (name === 'recipes') renderRecipes();
  if (name === 'menus') showGrid();
  if (name === 'shopping') { populateShoppingSelect(); renderShoppingList(); }
}

// ── MENU SCREENS ──────────────────────────────────────
function showGrid() {
  currentMenuId = null;
  document.getElementById('screen-grid').style.display = 'block';
  document.getElementById('screen-detail').style.display = 'none';
  document.getElementById('screen-estimator').style.display = 'none';
  renderMenuGrid();
}
function showDetail(menuId) {
  currentMenuId = menuId;
  document.getElementById('screen-grid').style.display = 'none';
  document.getElementById('screen-detail').style.display = 'block';
  document.getElementById('screen-estimator').style.display = 'none';
  document.getElementById('detail-edit-panel').classList.remove('open');
  renderDetail();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function openEstimator() {
  const menu = state.menus.find(m => m.id === currentMenuId);
  if (!menu) return;
  document.getElementById('screen-grid').style.display = 'none';
  document.getElementById('screen-detail').style.display = 'none';
  document.getElementById('screen-estimator').style.display = 'block';
  document.getElementById('estimator-title').textContent = menu.name;
  renderEstimator(menu);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function closeEstimator() { showDetail(currentMenuId); }

// ── CARD COLLAPSE ─────────────────────────────────────
function toggleCard(id) {
  const body = document.getElementById('card-body-' + id);
  const caret = document.getElementById('card-caret-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (caret) caret.classList.toggle('open');
}

// ── HELPERS ───────────────────────────────────────────
function costPerUom(ing) { return ing.price / ing.size; }
function recipeIdealCost(recipe) {
  return recipe.ingredients.reduce((sum, ri) => {
    const ing = state.ingredients.find(i => i.id === ri.ingId);
    return sum + (ing ? costPerUom(ing) * ri.amount : 0);
  }, 0);
}
function recipeActualCostPerUnit(recipe, qty) {
  if (!qty || qty <= 0) return 0;
  let total = 0;
  recipe.ingredients.forEach(ri => {
    const ing = state.ingredients.find(i => i.id === ri.ingId);
    if (!ing) return;
    total += Math.ceil((ri.amount * qty) / ing.size) * ing.price;
  });
  return total / qty;
}
function menuTrueCost(menu) {
  return menu.recipes.reduce((sum, item) => {
    const rec = state.recipes.find(r => r.id === item.recipeId);
    return sum + (rec ? recipeActualCostPerUnit(rec, item.qty) * item.qty : 0);
  }, 0);
}
function menuTotalBatches(menu) { return menu.recipes.reduce((s, i) => s + i.qty, 0); }
function calcIngUsage(menu) {
  const ingUsage = {};
  menu.recipes.forEach(item => {
    const rec = state.recipes.find(r => r.id === item.recipeId);
    if (!rec) return;
    rec.ingredients.forEach(ri => {
      const ing = state.ingredients.find(i => i.id === ri.ingId);
      if (!ing) return;
      if (!ingUsage[ri.ingId]) ingUsage[ri.ingId] = { ing, consumed: 0, cost: 0 };
      ingUsage[ri.ingId].consumed += ri.amount * item.qty;
      ingUsage[ri.ingId].cost += costPerUom(ing) * ri.amount * item.qty;
    });
  });
  Object.values(ingUsage).forEach(u => {
    u.unitsOpened = Math.ceil(u.consumed / u.ing.size);
    u.unitsCost = u.unitsOpened * u.ing.price;
  });
  return ingUsage;
}
function sweetSpotHint(recipe, currentQty) {
  if (!currentQty || currentQty <= 0) return '';
  const currentCost = recipeActualCostPerUnit(recipe, currentQty);
  if (currentCost === 0) return '';
  const scanTo = currentQty * 3;
  let bestQty = null, bestCost = currentCost;
  for (let q = currentQty + 1; q <= scanTo; q++) {
    const c = recipeActualCostPerUnit(recipe, q);
    if (c < bestCost) { bestCost = c; bestQty = q; break; }
  }
  if (!bestQty || (currentCost - bestCost) / currentCost < 0.10) {
    if (currentQty === 1) return `<div class="sweet-spot optimal">\u2713 Good quantity</div>`;
    const prevCost = recipeActualCostPerUnit(recipe, currentQty - 1);
    if (prevCost > currentCost) return `<div class="sweet-spot optimal">\u2713 You're at a good quantity</div>`;
    return '';
  }
  return `<div class="sweet-spot hint">\u2193 Make ${bestQty} batches instead and save $${(currentCost - bestCost).toFixed(2)}/batch</div>`;
}
function ingOptsHTML(selectedId) {
  return state.ingredients.map(i =>
    `<option value="${i.id}" ${i.id === selectedId ? 'selected' : ''}>${i.name} (${i.uom})</option>`

    uom: u.ing.uom, size: u.ing.size, price: u.ing.price,
    totalCost: u.unitsOpened * u.ing.price,
  })).sort((a, b) => a.name.localeCompare(b.name));
  const totalCost = items.reduce((s, i) => s + i.totalCost, 0);
  el.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-label">${items.length} items to buy</div>
        <div style="font-family:var(--mono);font-size:0.88rem;font-weight:600;color:var(--accent)">Est. $${totalCost.toFixed(2)}</div>
      </div>
      ${items.map(i => `
        <div class="shop-item">
          <div>
            <div style="font-weight:500">${i.name}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">${i.pkgsNeeded} pkg${i.pkgsNeeded !== 1 ? 's' : ''} \u00D7 ${i.size} ${i.uom}s @ $${i.price.toFixed(2)} ea</div>
          </div>
          <div class="shop-qty">$${i.totalCost.toFixed(2)}</div>
        </div>`).join('')}
    </div>`;
}

// ── INIT ──────────────────────────────────────────────
renderIngredients();
</script>
</body>
</html>
